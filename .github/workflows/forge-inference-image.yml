name: forge-inference image

# Builds the on-demand inference container and publishes it PUBLICLY to GHCR from
# this public repo, so a rented Vast.ai GPU can pull it anonymously. Consumed by
# KandiForge/servers (api/lib/vast/*).

on:
  push:
    branches: [main]
    paths:
      - 'forge-inference/**'
      - '.github/workflows/forge-inference-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: forge-inference
          push: true
          tags: |
            ghcr.io/kandiforge/forge-inference:latest
            ghcr.io/kandiforge/forge-inference:${{ github.sha }}
