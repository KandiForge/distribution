name: forge-inference images

# Builds one self-contained image PER MODEL (weights baked in) and publishes them
# to GHCR: ghcr.io/kandiforge/forge-jawbreaker, ghcr.io/kandiforge/forge-poprock.
# A rented Vast GPU pulls the image and serves — no runtime HuggingFace download.

on:
  push:
    branches: [main]
    paths:
      - 'forge-inference/**'
      - '.github/workflows/forge-inference-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jawbreaker        # 7B — throughput tier (default)
            hf_repo: Qwen/Qwen2.5-Coder-7B-Instruct-GGUF
            hf_file: qwen2.5-coder-7b-instruct-q4_k_m.gguf
          - name: poprock           # 32B — quality tier
            hf_repo: Qwen/Qwen2.5-Coder-32B-Instruct-GGUF
            hf_file: qwen2.5-coder-32b-instruct-q4_k_m.gguf
    steps:
      - name: Free runner disk (baked models are large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: forge-inference
          push: true
          build-args: |
            MODEL_HF_REPO=${{ matrix.hf_repo }}
            MODEL_HF_FILE=${{ matrix.hf_file }}
          tags: ghcr.io/kandiforge/forge-${{ matrix.name }}:latest
